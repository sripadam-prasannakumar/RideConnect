<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation / Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<img alt="DriveMate Logo" class="w-full h-full object-contain" data-alt="DriveMate professional transport logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEkjMrzGuW0FpO4GMoKU9T1M9Bt87U1naliVvVERhX49bEFm2I4Xc6-4NxbrSZ_uuxhMv2p66yZZGYH0WzA2jCWSnRyy0ZwgGdUKYvQK1ekCXdnx2P8ZOYDyEvo9mWJkJrJxZSs_AK79nvYooAMZoBkp86dJHhl-ZC_5XIGVHqliSWePrzEmkpLRyWBK4rMXARys4GNnqTReFtuGVkUVWyvPl2_GHxNMshQSeVC68wVDLZWea9RGtNcjkzP297PPhOEPLkTf0Mmi8"/>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">DriveMate</h2>
</div>
<div class="flex items-center gap-4">
<span class="hidden md:block text-sm text-slate-500 dark:text-slate-400">Need help?</span>
<div class="bg-primary/10 p-2 rounded-full text-primary">
<span class="material-symbols-outlined text-xl">help_outline</span>
</div>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Hero Image Area -->
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[200px] shadow-2xl relative" data-alt="Modern luxury car interior at night with city lights" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC_UaJWy-0rT61tXUycqLqfM9BnGVVWwlthmSRaJIt1ToAk-F9tUoxMu63mtEqtkO92U01vWChLaTmNN-IfdxqkHYRfRmuWLNyJhG7MMFENydy0sEky7HO3Uhc0DTJePorkOiqHVW93m3srP5zy4izALFrGrKkKJYtw7apIasbAh47DO5hk-2fkNOAye-N2vrNL5MB8RP9oUGThP6WctzB9cW210zcdDE7aU4hwG4zx5ZVRySrHOgj6sCMc1D_Yli-3Tk7aL3NcjJ0");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-transparent"></div>
</div>
</div>
<!-- Welcome Text -->
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-white text-3xl md:text-4xl font-black leading-tight tracking-tight">Welcome Back, Partner</h1>
<p class="text-slate-500 dark:text-primary/70 text-base font-normal">Sign in to start your shift and access your dashboard.</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Email Field -->
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-2">Email or Phone Number</span>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-white border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="driver@drivemate.com" type="text"/>
</label>
<!-- Password Field -->
<label class="flex flex-col w-full">
<div class="flex justify-between items-center pb-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</span>
<a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex w-full">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-white border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 pr-12 text-base placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg h-14 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2">
<span>Login as Driver</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Sign Up Prompt -->
<div class="flex flex-col items-center gap-4 mt-4">
<div class="flex items-center gap-2 w-full">
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
<span class="text-slate-400 text-xs uppercase tracking-widest font-bold">New to DriveMate?</span>
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
</div>
<p class="text-slate-600 dark:text-slate-400 text-sm">
                            Want to earn on your own schedule?
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up as Driver</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer Info -->
<footer class="p-8 text-center">
<p class="text-slate-500 dark:text-slate-600 text-xs">
                © 2024 DriveMate Technologies Inc. All rights reserved.
            </p>
<div class="flex justify-center gap-4 mt-2">
<a class="text-slate-400 dark:text-slate-600 text-xs hover:text-primary" href="#">Terms of Service</a>
<a class="text-slate-400 dark:text-slate-600 text-xs hover:text-primary" href="#">Privacy Policy</a>
</div>
</footer>
</div>
</div>
</body></html>

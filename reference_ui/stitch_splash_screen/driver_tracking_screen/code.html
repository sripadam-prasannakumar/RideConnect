<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>DriveMate - Live Tracking</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative h-screen w-full flex flex-col">
<!-- Top Navigation Bar -->
<header class="absolute top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-4 bg-background-dark/80 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="size-6 text-primary">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 18.4228L42 11.475V34.3663C42 34.7796 41.7457 35.1504 41.3601 35.2992L24 42V18.4228Z" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">DriveMate</h2>
</div>
</div>
<div class="flex items-center gap-3">
<div class="hidden md:flex flex-col items-end">
<span class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Secure Session</span>
<span class="text-xs text-primary font-medium flex items-center gap-1">
<span class="size-1.5 bg-primary rounded-full animate-pulse"></span> Encrypted
                    </span>
</div>
<button class="bg-primary/10 text-primary p-2 rounded-lg hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Area (Interactive Map Background) -->
<main class="flex-1 relative bg-slate-900 overflow-hidden">
<!-- Simulated Map Component -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-60 grayscale-[0.8] brightness-[0.4]" data-alt="Dark themed city map with navigation grid" data-location="Singapore" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCz2qPqvQQ4urvCgMMOVXqrZqUWyrM77Zb31no6UbzrbYtu8-JZZgGex0yoOhyn06P1vppFMvHw2cf5Yk145DTCM2a_6bjKA85XvmHkJFESvLrJ6WhShlqVVemujglcnQRUUl1Ry-ykBOIp0iLdF4Bjud2qmzo-HRrGGNBlXTz9S1lnoOZdsv0gGGOhmTkFRhy5es1i0ylw-GTlZDMBayzVqnvFMrZePhNWWYDh-J3zUYHo9AwftLiAnkH5UZ1avfJ_bF1AA8N4h7s');">
</div>
<!-- Route Visualization (Simplified SVG) -->
<svg class="absolute inset-0 w-full h-full z-10 pointer-events-none" preserveaspectratio="none">
<!-- Path Glow -->
<path class="opacity-20 blur-md" d="M 300,600 Q 500,500 700,400 T 900,200" fill="none" stroke="#0dccf2" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<!-- Main Path -->
<path d="M 300,600 Q 500,500 700,400 T 900,200" fill="none" stroke="#0dccf2" stroke-dasharray="1, 8" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<!-- Destination Pin -->
<circle cx="900" cy="200" fill="#0dccf2" r="8"></circle>
<circle class="opacity-30 animate-ping" cx="900" cy="200" fill="#0dccf2" r="16"></circle>
</svg>
<!-- Driver Marker -->
<div class="absolute z-20" style="left: 450px; top: 520px;">
<div class="relative flex items-center justify-center">
<div class="absolute size-14 bg-primary/20 rounded-full blur-xl"></div>
<div class="size-10 bg-primary rounded-full shadow-[0_0_20px_rgba(13,204,242,0.6)] flex items-center justify-center transform rotate-[-45deg]">
<span class="material-symbols-outlined text-background-dark font-bold text-2xl">navigation</span>
</div>
</div>
</div>
<!-- Safety SOS Button Overlay -->
<div class="absolute right-6 top-24 z-30 flex flex-col gap-3">
<button class="flex items-center justify-center size-12 rounded-xl bg-background-dark/90 border border-white/10 text-slate-100 shadow-xl backdrop-blur-md">
<span class="material-symbols-outlined">layers</span>
</button>
<button class="flex items-center justify-center size-12 rounded-xl bg-background-dark/90 border border-white/10 text-slate-100 shadow-xl backdrop-blur-md">
<span class="material-symbols-outlined">near_me</span>
</button>
<button class="flex items-center justify-center size-12 rounded-xl bg-red-600/20 border border-red-500/50 text-red-500 shadow-xl backdrop-blur-md group hover:bg-red-600 hover:text-white transition-all">
<span class="material-symbols-outlined">shield_with_heart</span>
</button>
</div>
<!-- Floating Status Bar -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 z-30 px-6 py-2.5 bg-background-dark/90 backdrop-blur-xl border border-primary/30 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.4)] flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="relative flex size-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full size-2 bg-primary"></span>
</span>
<span class="text-xs font-bold tracking-widest text-primary uppercase">Live Tracking</span>
</div>
<div class="h-4 w-px bg-white/10"></div>
<p class="text-sm font-medium text-slate-100">ETA: <span class="text-primary font-bold">3 mins</span></p>
</div>
</main>
<!-- Bottom-Docked Card -->
<footer class="absolute bottom-0 left-0 right-0 z-50 p-6 md:px-12 md:pb-8 pointer-events-none">
<div class="max-w-4xl mx-auto w-full bg-background-dark border border-white/10 rounded-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.6)] pointer-events-auto overflow-hidden">
<!-- Status Strip -->
<div class="bg-primary/10 px-6 py-2 border-b border-primary/20">
<p class="text-primary text-xs font-bold uppercase tracking-widest">On the way to your location</p>
</div>
<div class="p-6 md:p-8 flex flex-col md:flex-row items-center gap-6">
<!-- Driver Profile & Info -->
<div class="flex items-center gap-5 flex-1 w-full">
<div class="relative group">
<div class="size-20 rounded-2xl overflow-hidden border-2 border-primary/40 shadow-lg">
<img alt="Marcus Chen Profile" class="w-full h-full object-cover" data-alt="Professional portrait of Marcus Chen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbTOmelg6TTsB-rymSOAq9h0MU2aZfzagyFxnTCqHv-Y4oOmHwhq7K9F_uL5tuvIeCmN4mzkNFF1Kb4yWaEe1o6b5sLriq2it8g_beYxYUj1OfIL07TjiB0NpKEnNRb9cfqo6HRD5QKXOy4ExvU1-qQvdk37CreEH7crCIK2gpQOzGCNS4eqdbL2HkCoGh8hJhjVTXMZNUpEeelCTUUB_IIa0HlwrEulxdIVvjqGXMoSrHkcWLiBrJr2fsyaW_uCdsJHbz-Ixv9vs"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-background-dark border border-white/10 rounded-lg px-2 py-0.5 flex items-center gap-1 shadow-md">
<span class="material-symbols-outlined text-primary text-sm fill-1">star</span>
<span class="text-xs font-bold text-slate-100">4.9</span>
</div>
</div>
<div class="flex-1">
<h3 class="text-xl font-extrabold text-slate-100 mb-1">Marcus Chen</h3>
<div class="flex flex-wrap items-center gap-x-3 gap-y-1">
<span class="text-sm text-slate-400 flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary text-sm">directions_car</span>
                                    Honda Civic • White
                                </span>
<div class="size-1 bg-slate-600 rounded-full"></div>
<span class="text-sm font-mono text-primary font-bold tracking-wider">B-2940-DA</span>
</div>
</div>
</div>
<!-- CTA Buttons -->
<div class="flex items-center gap-3 w-full md:w-auto">
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-primary text-background-dark px-6 py-3.5 rounded-xl font-bold transition-all hover:scale-[1.02] active:scale-[0.98]">
<span class="material-symbols-outlined">call</span>
                            Call
                        </button>
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white/5 text-slate-100 border border-white/10 px-6 py-3.5 rounded-xl font-bold transition-all hover:bg-white/10 hover:scale-[1.02] active:scale-[0.98]">
<span class="material-symbols-outlined">chat_bubble</span>
                            Message
                        </button>
<button class="p-3.5 rounded-xl bg-slate-800 text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">shield_with_heart</span>
</button>
</div>
</div>
<!-- Live Updates Progress -->
<div class="h-1.5 w-full bg-slate-800 relative">
<div class="absolute left-0 top-0 h-full bg-primary rounded-r-full shadow-[0_0_10px_rgba(13,204,242,0.5)]" style="width: 75%;"></div>
</div>
</div>
</footer>
</div>
</body></html>

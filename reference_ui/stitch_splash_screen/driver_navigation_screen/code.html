<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DriveMate Navigation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .map-gradient-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(16, 31, 34, 0.4) 100%);
        }
        .route-glow {
            filter: drop-shadow(0 0 8px #0dccf2);
        }
    </style>
</head>

<div class="absolute inset-0 z-0 bg-slate-800 dark:bg-background-dark">

<h1 class="text-primary text-xl font-bold tracking-tight">DriveMate</h1>
</div>
<div class="flex gap-2">
<button class="size-10 flex items-center justify-center rounded-lg bg-primary/10 border border-primary/20 text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="size-10 rounded-full bg-primary/20 border-2 border-primary overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Driver profile avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB323O5I3cEBwHhFsuXtIuorcp3IlGTMMRMz7rGroeZ7H1cp_PxfxRkBLg4Iph4lk7OUCN8W5NtuIHQeKEqmBOU92aIoko9vMfp4OJegiyn_HUswpXEmn99cl4_EP3f3Dt4PWr2122sPTvK_mOMSL-K5LPJvz64ORsR5dKinA8cvBuLMiTTcs2AG2MGlLi2whx8cO9zjj-vxzw9VUjoRtcW79pLvZ7JcqtQRy76iq5dnkb5GeKC2V2kb_AT8uCdDmem55WJqLQGN9w"/>
</div>
</div>
</header>
<!-- Turn-by-Turn Instruction Card -->
<div class="bg-background-dark/95 backdrop-blur-lg rounded-xl p-5 border-l-4 border-primary shadow-2xl flex items-center justify-between">
<div class="flex items-center gap-5">
<div class="bg-primary/20 p-3 rounded-lg text-primary">
<span class="material-symbols-outlined !text-4xl">turn_right</span>
</div>
<div>

<p class="text-primary font-bold mt-1">In 500 ft</p>
</div>
</div>
<div class="text-right">
<span class="material-symbols-outlined text-slate-500 !text-3xl">navigation</span>
</div>
</div>
</div>
<!-- Right Side Map Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-3">
<button class="size-12 rounded-lg bg-background-dark/90 border border-primary/20 text-white shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-12 rounded-lg bg-background-dark/90 border border-primary/20 text-white shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="size-12 rounded-lg bg-primary text-background-dark shadow-xl flex items-center justify-center mt-4">

</div>
<div>
<div class="flex items-center gap-2">
<h3 class="text-white text-xl font-bold">Sarah J.</h3>
<div class="flex items-center bg-primary/10 px-2 py-0.5 rounded text-primary text-xs font-bold">
<span class="material-symbols-outlined !text-xs mr-1 leading-none">star</span>
                                    4.9
                                </div>
</div>
<p class="text-slate-400 text-sm mt-1">Pickup: 1245 Diamond St, Beverly Hills</p>
</div>
</div>
<div class="text-right">
<p class="text-primary text-2xl font-black">8 min</p>
<p class="text-slate-400 text-sm">2.5 miles</p>
</div>
</div>
<div class="flex gap-3">
<button class="flex-1 bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all">
<span class="material-symbols-outlined">check_circle</span>
                        Arrived at Pickup
                    </button>
<button class="size-14 bg-slate-800 hover:bg-slate-700 text-primary border border-primary/20 rounded-xl flex items-center justify-center shadow-lg transition-all">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
<button class="size-14 bg-slate-800 hover:bg-slate-700 text-primary border border-primary/20 rounded-xl flex items-center justify-center shadow-lg transition-all">
<span class="material-symbols-outlined">call</span>
</button>
</div>
</div>
<!-- Handle indicator for expandable bottom sheet -->
<div class="w-12 h-1.5 bg-slate-600 rounded-full mx-auto mt-4 opacity-50"></div>
</div>
</div>
</body></html>

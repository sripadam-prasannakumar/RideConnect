<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .radar-ring {
            border: 2px solid rgba(13, 204, 242, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 md:px-40">
<div class="flex items-center gap-3">
<div class="text-primary size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 18.4228L42 11.475V34.3663C42 34.7796 41.7457 35.1504 41.3601 35.2992L24 42V18.4228Z" fill="currentColor" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">DriveMate</h2>
</div>
<button class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex flex-1 flex-col items-center justify-center px-4 py-8 md:px-40">
<div class="w-full max-w-[960px] flex flex-col items-center gap-8">
<!-- Radar / Map Area -->
<div class="relative w-full aspect-square md:aspect-video rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-900 shadow-2xl group">
<!-- Map Background -->
<div class="absolute inset-0 opacity-40 grayscale group-hover:grayscale-0 transition-all duration-700" data-alt="Dark stylized city map with navigation paths" data-location="New York City" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuChMqGwmeptkL3TGPreO_SELdSpeJkOrgmfVbXweRtiWErSEgms2WPm0ulQ3nJi-gjnoSTZPf3kcipPSpXl_ZHpt2St5x4dvnE3xqUzcl55ZKhH73dhBqn1a2I9svJrVVtxBaYB3YTs_vWam-sYXyIMyzIryjV_nIjOX-hMGgwxf3M11WroDzEp0ZPwVOxsGqQJltgbUl_mqlZVos-vADWdsdazBoiD2qHf96nHybYjzkUQOyt_pzJHGxUeIgsIUuD0RfMsOuPBq5Y"); background-size: cover; background-position: center;'>
</div>
<!-- Radar Rings -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="radar-ring h-32 w-32 border-primary/40"></div>
<div class="radar-ring h-64 w-64 border-primary/20"></div>
<div class="radar-ring h-96 w-96 border-primary/10"></div>
<!-- Center Location Marker -->
<div class="relative flex items-center justify-center">
<div class="absolute h-8 w-8 bg-primary/20 rounded-full blur-md"></div>
<div class="h-4 w-4 bg-primary rounded-full shadow-[0_0_15px_rgba(13,204,242,0.8)] border-2 border-white dark:border-background-dark z-10"></div>
</div>
<!-- Scanning Driver Dots -->
<div class="absolute top-1/4 left-1/3 h-2 w-2 bg-primary/60 rounded-full"></div>
<div class="absolute top-1/2 right-1/4 h-2 w-2 bg-primary/60 rounded-full"></div>
<div class="absolute bottom-1/3 left-1/2 h-2 w-2 bg-primary/60 rounded-full"></div>
</div>
<!-- Map Overlay Controls -->
<div class="absolute bottom-4 right-4 flex flex-col gap-2">
<button class="flex size-10 items-center justify-center rounded-lg bg-white/10 backdrop-blur-md border border-white/20 text-white shadow-lg">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-10 items-center justify-center rounded-lg bg-white/10 backdrop-blur-md border border-white/20 text-white shadow-lg">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- Status Text -->
<div class="text-center space-y-3">
<h1 class="text-2xl md:text-4xl font-bold tracking-tight text-slate-900 dark:text-white">Finding your professional driver...</h1>
<p class="text-slate-500 dark:text-slate-400 text-base md:text-lg">Scanning for drivers within a 5km radius of your location.</p>
</div>
<!-- Booking Details Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm">
<div class="flex items-center justify-between mb-6">
<div class="flex items-center gap-4">
<div class="h-12 w-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">directions_car</span>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-white">Honda Civic</h3>
<p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Vehicle Selected</p>
</div>
</div>
<div class="text-right">
<span class="text-sm font-medium text-primary">Premium Tier</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800 pt-6">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">location_on</span>
<span class="text-xs font-medium uppercase">Pickup</span>
</div>
<p class="text-sm font-semibold text-slate-900 dark:text-slate-100 truncate">123 Luxury Avenue</p>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-1.5 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="text-xs font-medium uppercase">Duration</span>
</div>
<p class="text-sm font-semibold text-slate-900 dark:text-slate-100">4 Hours</p>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="w-full max-w-md pt-4">
<button class="w-full py-4 rounded-xl border-2 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold hover:bg-red-50 hover:border-red-200 hover:text-red-500 dark:hover:bg-red-950/20 dark:hover:border-red-900/50 transition-all">
                        Cancel Request
                    </button>
</div>
</div>
</main>
<!-- Bottom Tab Bar (Mobile Viewport) -->
<footer class="md:hidden sticky bottom-0 w-full border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-3 flex justify-around">
<div class="flex flex-col items-center text-primary">
<span class="material-symbols-outlined">explore</span>
<span class="text-[10px] font-medium mt-1">Radar</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium mt-1">History</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-medium mt-1">Profile</span>
</div>
</footer>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DriveMate - Trip Status</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-6 py-4 bg-background-dark/80 backdrop-blur-md border-b border-slate-800/50">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/20 text-primary">
<span class="material-symbols-outlined">route</span>
</div>
<div>
<h1 class="text-lg font-bold leading-tight tracking-tight">Active Trip</h1>
<p class="text-xs text-slate-400">ID: #DM-99234</p>
</div>
</div>
<div class="flex gap-3">
<button class="flex items-center justify-center size-10 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">shield_with_heart</span>
</button>
<button class="flex items-center justify-center size-10 rounded-lg bg-slate-800 text-slate-100 border border-slate-700 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Map Area (Simulated) -->
<main class="relative flex-1 w-full bg-slate-900">
<div class="absolute inset-0 bg-cover bg-center opacity-60" data-alt="Modern dark navigation map showing a teal route line" data-location="San Francisco, California" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAVg0KQCh2Z52yQGdoXJlmOjw7htzLz61GHh1_pElhKLEHqOZ3wQaxtL-ZizsebEkG1xlFYrnsGiD0aGZaMmmoHIVQIQTBCrbIJ3PVFvasH6utAS-js0RttSmuQPdWYSm1wVtcqYZYx2szr8Z7lIk5YyqUs5L4fhI3jdQUboMDVlfbsOgEu1334Mflhe80NHUwZgi1EE_PY8JxfCrzTXkOZ-Vi13Wnh2WAG1Ld6v6nv3_CznvvdO6fXICTOA4KOa09_qtIGG4m6A1U');">
</div>
<!-- Floating Map Controls -->
<div class="absolute right-6 top-24 flex flex-col gap-2 z-10">
<button class="flex size-11 items-center justify-center rounded-lg bg-background-dark border border-slate-700 shadow-xl text-slate-100">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-11 items-center justify-center rounded-lg bg-background-dark border border-slate-700 shadow-xl text-slate-100">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="mt-2 flex size-11 items-center justify-center rounded-lg bg-primary text-background-dark shadow-xl">
<span class="material-symbols-outlined">navigation</span>
</button>
</div>
<!-- Destination Indicator -->
<div class="absolute top-28 left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-md">
<div class="bg-background-dark/90 backdrop-blur-md p-4 rounded-xl border border-slate-700 flex items-center gap-4 shadow-2xl">
<div class="flex-1">
<p class="text-[10px] uppercase tracking-widest text-primary font-bold">Next Turn</p>
<p class="text-lg font-bold">400 ft • Market St.</p>
</div>
<div class="size-12 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">turn_right</span>
</div>
</div>
</div>
</main>
<!-- Bottom Sheet UI -->
<section class="relative z-30 bg-background-dark border-t border-slate-800 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<div class="mx-auto w-12 h-1.5 bg-slate-700 rounded-full mt-3 mb-6"></div>
<div class="px-6 pb-8 space-y-6 max-w-2xl mx-auto">
<!-- Customer & Vehicle Info -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Customer Portrait" class="size-16 rounded-2xl object-cover border-2 border-primary/30" data-alt="Professional portrait of Sarah J." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPe-zePhHWHH2_jZ9_JbY8QxaQRFvhLOuJ6VXDSn67Oac-i64gUA8YpipvR1sg8WsHBfRZrJadtBsRkOLZKOY31KCMZVQDHGE6txhE4QBegqf76i9ROmr-9P7XyGNMuh5ZT7hxDHBgh8Vad_UFqOD_BpwEoyNNoKSdCRLetTMprRMzbF5qoianQ0lwyDVyrbsrwlbTW1t871fMY5JmQjDo43YC_wo9zIUanpdea8IQpVUZ5mZkxjoIBV3b3zupnE1GhWKBRMNV1h4"/>
<div class="absolute -bottom-1 -right-1 size-6 bg-green-500 border-4 border-background-dark rounded-full"></div>
</div>
<div>
<h2 class="text-xl font-bold">Sarah J.</h2>
<div class="flex items-center gap-2 text-slate-400 text-sm">
<span class="material-symbols-outlined text-sm">electric_car</span>
<span>Tesla Model S • White</span>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="flex size-12 items-center justify-center rounded-xl bg-slate-800 text-primary border border-slate-700 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
<button class="flex size-12 items-center justify-center rounded-xl bg-slate-800 text-primary border border-slate-700 hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">call</span>
</button>
</div>
</div>
<!-- Trip Progress -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<div>
<p class="text-xs text-slate-400 uppercase tracking-wider mb-1">Trip Progress</p>
<p class="text-sm font-medium">To: 101 California St, SF</p>
</div>
<p class="text-primary font-bold">65%</p>
</div>
<div class="h-2.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_rgba(13,204,242,0.5)]" style="width: 65%;"></div>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
<p class="text-xs text-slate-400 mb-1">Elapsed Time</p>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">schedule</span>
<p class="text-xl font-bold">12:45</p>
</div>
</div>
<div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50">
<p class="text-xs text-slate-400 mb-1">Remaining</p>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">distance</span>
<p class="text-xl font-bold">3.2 mi</p>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-3 transition-all transform active:scale-[0.98]">
<span class="material-symbols-outlined font-bold">check_circle</span>
                    End Ride
                </button>
<p class="text-center text-xs text-slate-500 mt-4">Swipe up for trip details &amp; passenger notes</p>
</div>
</div>
</section>
</div>
</body></html>

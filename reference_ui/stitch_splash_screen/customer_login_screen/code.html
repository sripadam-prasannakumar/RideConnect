<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>DriveMate - Login</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="flex flex-1 justify-center items-center py-10 px-4">
<div class="layout-content-container flex flex-col max-w-[480px] w-full bg-slate-900/40 backdrop-blur-md rounded-xl border border-primary/10 overflow-hidden shadow-2xl">
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden min-h-64 relative" data-alt="Luxury car interior at night with neon dashboard lights" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDAFnBu-9r1A20iGXgVb3xQWko_zx8i_AiZ63OlwIgN9zVAeZoA1IHthyE025mfYkYGQ9Ii6k7ZpRJ_0Dx15uJIFppZED31pTu8BNMfFYOSYfRwBQ9DZuXjet9BXt73M_YxCNaURT7kF-BeA3yt6TP9im40-xxMVT1jNnolOqWQcDI-mCv20ucXgKU8vmAeQCef-t4JwKVvznJhN5xCSFIBqMK-CdVInm1i7VGPGMiJLMvW_FPl1p7cFjtHE9VyiwA-UBQq9__B2Q4");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/40 to-transparent"></div>
<div class="relative p-6">
<h1 class="text-white text-4xl font-black leading-tight tracking-tight">DriveMate</h1>
<p class="text-primary text-base font-medium">Your journey starts here</p>
</div>
</div>
</div>
<div class="p-8 space-y-6">
<div class="space-y-2">
<h2 class="text-2xl font-bold text-slate-100">Welcome Back</h2>
<p class="text-slate-400 text-sm">Please enter your details to sign in</p>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-medium">Email or Phone</label>
<input class="form-input flex w-full rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 h-12 placeholder:text-slate-500 px-4 text-base transition-all" placeholder="hello@drivemate.com" type="text"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-300 text-sm font-medium">Password</label>
<a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative flex w-full items-stretch">
<input class="form-input flex w-full rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800/50 h-12 placeholder:text-slate-500 px-4 pr-12 text-base transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold h-12 rounded-lg transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                            Sign In
                        </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-500 text-xs uppercase tracking-widest font-bold">Or continue with</span>
<div class="flex-grow border-t border-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-700 bg-slate-800/30 hover:bg-slate-800/60 transition-all">

<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-slate-700 bg-slate-800/30 hover:bg-slate-800/60 transition-all">
<svg class="w-5 h-5 fill-slate-200" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.702z"></path>
</svg>
<span class="text-sm font-medium text-slate-200">Apple</span>
</button>
</div>
<div class="text-center pt-4">
<p class="text-slate-400 text-sm">
                                Don't have an account? 
                                <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up for free</a>
</p>
</div>
</div>
</div>
</div>
</div>
<div class="fixed bottom-6 right-6 flex items-center gap-2 px-4 py-2 bg-slate-800/80 backdrop-blur rounded-full border border-primary/20 text-xs text-slate-400">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
            System status: Optimal
        </div>
</div>
</body></html>

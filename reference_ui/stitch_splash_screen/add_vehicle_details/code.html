<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0dccf2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>DriveMate - Add Vehicle Details</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-primary/20 px-6 md:px-10 py-4 max-w-[960px] mx-auto w-full">
<div class="flex items-center gap-4">
<div class="size-8 flex items-center justify-center text-primary">
<img class="w-full h-full object-contain" data-alt="DriveMate Logo Image 2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqaMJbtq5MJcUS0dGUrTOvcwWV5hGR2YeAGKrGxp8On39YxHZ0xP6xvLwDZu4YCDVxxJ8lA5i3tF6V9TTRTdi6O1HaLkXinNt9LQWGcmFFcKzqQq1_yySD8NWQVOJZiiiqDpMTsT9It80IK8jXkNlfpp12VUyypE5Z-2kwn2iLKhZMRGZUPRuF8yDt74gobl3Rgv08ryT2l0x8sqUFDWAmZXOWtEk05FB2uT2aoLcq37yQMilpWTJW4Gxnx879l05edm-av96E4UM"/>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">DriveMate</h2>
</div>
<div class="flex flex-1 justify-end gap-4 items-center">
<button class="flex size-10 cursor-pointer items-center justify-center rounded-lg bg-slate-200 dark:bg-primary/10 text-slate-900 dark:text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-primary/30" data-alt="User profile placeholder" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAbyggs0wGkzZjKbDvB62i8tyD-QuV8_q6-cBDAfGWT7D4mfBipvfHHAN4lPA3V_Liw7WWpRYtaMdGkwfkpIr7s00SSJQFQo-uCuDTuwUyqbvotX-d6YLVcGsaYttHmKaEBRIu-oAVXWyS-Sjen1dlzbZsGjO9XxNMZ0GoicQYegshjUOytRafM6dqGmI62K481Q-BLGRleOoZRAqVtxmj8NH4N-DixgTKPrdEqmuW7DRL-1luQVvJ6oigOQmu4Fch-LUApwD_lPes");'></div>
</div>
</header>
<main class="flex flex-1 justify-center py-8 px-6">
<div class="layout-content-container flex flex-col max-w-[520px] flex-1">
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 mb-8">
<div class="flex gap-6 justify-between items-end">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Step 3 of 3</p>
<p class="text-primary text-sm font-bold">100%</p>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-primary/10 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 100%;"></div>
</div>
<p class="text-slate-500 dark:text-primary/70 text-sm font-normal">Final Step: Vehicle Details</p>
</div>
<!-- Header Text -->
<div class="flex flex-col gap-2 mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-tight">Add Vehicle Details</h1>
<p class="text-slate-600 dark:text-slate-400 text-base">Enter your vehicle information to complete the setup and start your journey.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6">
<!-- Registration Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wide">Vehicle Registration Number</label>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="e.g. ABC-1234" type="text"/>
</div>
<!-- Fuel Type Selection -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wide">Fuel Type</label>
<div class="grid grid-cols-3 gap-3">
<label class="relative flex cursor-pointer items-center justify-center rounded-xl border-2 border-slate-200 dark:border-primary/10 bg-white dark:bg-primary/5 p-4 text-center hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input checked="" class="sr-only" name="fuel" type="radio" value="petrol"/>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary">local_gas_station</span>
<span class="text-sm font-bold">Petrol</span>
</div>
</label>
<label class="relative flex cursor-pointer items-center justify-center rounded-xl border-2 border-slate-200 dark:border-primary/10 bg-white dark:bg-primary/5 p-4 text-center hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input class="sr-only" name="fuel" type="radio" value="diesel"/>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-slate-400">oil_barrel</span>
<span class="text-sm font-bold">Diesel</span>
</div>
</label>
<label class="relative flex cursor-pointer items-center justify-center rounded-xl border-2 border-slate-200 dark:border-primary/10 bg-white dark:bg-primary/5 p-4 text-center hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input class="sr-only" name="fuel" type="radio" value="ev"/>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-slate-400">ev_station</span>
<span class="text-sm font-bold">EV</span>
</div>
</label>
</div>
</div>
<!-- Transmission Selection -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wide">Transmission Type</label>
<div class="flex gap-3">
<label class="flex-1 relative flex cursor-pointer items-center justify-center rounded-xl border-2 border-slate-200 dark:border-primary/10 bg-white dark:bg-primary/5 p-4 hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input class="sr-only" name="transmission" type="radio" value="manual"/>
<span class="text-base font-bold">Manual</span>
</label>
<label class="flex-1 relative flex cursor-pointer items-center justify-center rounded-xl border-2 border-slate-200 dark:border-primary/10 bg-white dark:bg-primary/5 p-4 hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
<input checked="" class="sr-only" name="transmission" type="radio" value="automatic"/>
<span class="text-base font-bold">Automatic</span>
</label>
</div>
</div>
<!-- Submit Button -->
<div class="mt-8">
<button class="w-full flex h-14 items-center justify-center rounded-xl bg-primary text-background-dark text-lg font-bold shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                            Save &amp; Continue
                        </button>
</div>
</form>
<p class="text-center text-slate-500 dark:text-slate-400 text-sm mt-8">
                    By clicking continue, you agree to our <a class="text-primary underline" href="#">Terms of Service</a>
</p>
</div>
</main>
</div>
</div>
</body></html>
